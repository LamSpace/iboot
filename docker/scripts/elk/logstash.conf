# iBoot Logstash 管道配置
# 接收来自 logstash-logback-encoder 的 JSON 日志，转发至 Elasticsearch

input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # 确保时间戳字段存在
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # 移除不需要的字段
  mutate {
    remove_field => ["@version", "host", "port"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "iboot-logs-%{+YYYY.MM.dd}"
  }
}
