server:
  port: 8080
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: iboot-admin
  banner:
    location: classpath:banner.txt
  # JVM 系统属性配置
  jmx:
    enabled: false
  datasource:
    # 使用 Druid 连接池
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      # Druid 数据库连接配置
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/iboot_admin?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD:root}
      # Druid 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: true
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      filter:
        slf4j:
          enabled: true
          statement-create-after-log-enabled: true
          statement-close-after-log-enabled: true
          result-set-open-after-log-enabled: true
          result-set-close-after-log-enabled: true
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      # WebStatFilter 配置，说明请参考 Druid Wiki
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: '*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*'
      # StatViewServlet 配置
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
        allow:
        deny:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  # Flyway 配置
  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
  security:
    user:
      name: actuator
      password: actuator123
      roles: ACTUATOR
  # Quartz 定时任务配置
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    scheduler-name: iBootScheduler
    overwrite-existing-jobs: true
    wait-for-jobs-to-complete-on-shutdown: true
    properties:
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: false
      org.quartz.jobStore.misfireThreshold: 60000
      org.quartz.threadPool.threadCount: 10

mybatis:
  type-aliases-package: com.iboot.admin.infrastructure.persistence.po
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false

logging:
  level:
    root: INFO
    com.iboot.admin: DEBUG

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    # 允许匿名访问
    csrf:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,env,configprops,mappings,logfile,threaddump,caches,scheduledtasks,conditions,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      roles: ADMIN
    logfile:
      external-file: logs/iboot-admin.log
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
        jdbc.connections.usage: true
        cache.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    enable:
      jvm: true
      system: true
      logback: true
      tomcat: true
      spring-data: true
    tags:
      application: iboot-admin
      namespace: default
  # 移除 server.port 配置，使用应用主端口即可
  # 如需将 actuator 暴露在独立端口，取消下面的注释并设置端口号
  # server:
  #   port: 8081
  #   address: 0.0.0.0

# Spring Boot Admin
spring.boot.admin:
  client:
    url: http://localhost:8080/sba
    instance:
      service-base-url: http://localhost:8080
      name: iboot-admin
      metadata:
        tags:
          environment: development
  context-path: /sba

jwt:
  secret: iboot-admin-secret-key-for-jwt-token-generation-minimum-256-bits
  expiration: 604800      # JWT 签名兜底过期（秒），7天
  session-timeout: 30     # Redis 滑动过期（分钟），实际控制会话时长

# Elasticsearch 配置
elasticsearch:
  uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  connect-timeout: 5s
  socket-timeout: 30s

# SSE 推送配置
iboot:
  push:
    enabled: true
    # SSE 配置
    sse:
      timeout: 300000        # 连接超时 (5 分钟)
      heartbeat-interval: 30000  # 心跳间隔 (30 秒)
      reconnect-interval: 5000   # 重连间隔 (5 秒)
    # 推送配置
    notification:
      max-unread: 50         # 最大未读消息数
      batch-size: 20         # 批量推送大小
    # 广播器配置
    broadcaster: local       # local | redis
    redis:
      channel: iboot:push:events


