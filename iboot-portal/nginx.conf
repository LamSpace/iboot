# iBoot 前端项目 Nginx 配置
# 用于生产环境的静态资源服务

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # 基本设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    # SSE 长连接超时设置为 1 小时
    keepalive_timeout 3600;
    types_hash_max_size 2048;

    # Gzip 压缩 (不压缩 SSE 流)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    # 不压缩 SSE 流
    gzip_proxied any no-cache no-store private auth;

    server {
        listen 80;
        server_name localhost;

        # 根目录指向构建后的静态文件
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # API 代理配置 (支持 SSE 推送)
        location /iboot/api {
            proxy_pass http://iboot-admin:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # SSE 推送支持 - 禁用代理缓冲
            proxy_buffering off;
            # 添加 Nginx X-Accel-Buffering 头部，禁用加速缓冲
            proxy_set_header X-Accel-Buffering no;

            # 超时设置 - SSE 长连接需要足够长的超时
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            # SSE 读取超时设置为 1 小时，与后端超时配置匹配
            proxy_read_timeout 3600s;

            # 重写路径，去掉 /iboot/api 前缀，只保留 /api
            rewrite ^/iboot/(.*)$ /$1 break;
        }

        # 错误页面
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}